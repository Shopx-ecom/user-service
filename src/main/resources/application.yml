server:
  port: 9000

spring:
  application:
    name: shopx-api-gateway
  profiles:
    active: dev
  mvc:
    throw-exception-if-no-handler-found: true
  web:
    resources:
      add-mappings: false
  jackson:
    mapper:
      ACCEPT_CASE_INSENSITIVE_ENUMS: 'true'

springdoc:
  swagger-ui:
    enabled: true
  version: 2.6.7
  api-docs:
    enabled: true
  url: http://shopx-ecommerce.duckdns.org